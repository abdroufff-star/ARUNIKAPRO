
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARUNIKA Print POS</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- LIBRARY UNTUK EXPORT PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800">
    <div id="root"></div>

    <script type="text/babel">
        // =======================================================================
        // PASTE LINK URL DARI GOOGLE APPS SCRIPT ANDA DI BAWAH INI:
        const API_URL = "https://script.google.com/macros/s/AKfycbwMe4M2yN578-CfqpbkMdFOPlBA4kU5QQcVJkL8Ow-vdJLun5W7RBDvcOyGcH3LDoVJ/exec";
        // =======================================================================

        const { useState, useEffect, useMemo } = React;

        const formatRupiah = (number) => new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
        const parseInputNumber = (val) => val ? val.toString().replace(/[^0-9]/g, '') : '';
        const formatInputNumber = (val) => val ? val.toString().replace(/[^0-9]/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ".") : '';

        const formatPhoneWA = (phone) => {
            if (!phone) return '';
            return phone.startsWith('0') ? '62' + phone.substring(1) : phone;
        };

        const displayNota = (inv) => {
            if (inv && inv.notaSeq) return `INV-${inv.notaSeq.toString().padStart(5, '0')}`;
            if (inv && inv.id) return `INV-${inv.id.toString().slice(-6)}`;
            return 'INV-00000';
        };

        function App() {
            const [isLoading, setIsLoading] = useState(true);
            const [toast, setToast] = useState(null); 

            const [currentUser, setCurrentUser] = useState(() => {
                const saved = localStorage.getItem('arunika_current_user');
                return saved ? JSON.parse(saved) : null;
            });
            
            const [users, setUsers] = useState([
                { id: 1, username: 'owner', password: '123', role: 'Owner' },
                { id: 2, username: 'karyawan', password: '123', role: 'Karyawan' }
            ]);
            
            const [products, setProducts] = useState([]);
            const [customers, setCustomers] = useState([]);
            const [invoices, setInvoices] = useState([]);
            const [cashBook, setCashBook] = useState([]);
            const [personalCashBook, setPersonalCashBook] = useState([]);

            const [activeTab, setActiveTab] = useState('dashboard');
            const [detailModal, setDetailModal] = useState(null);
            
            const [payModal, setPayModal] = useState(null);
            const [payMethod, setPayMethod] = useState('CASH');
            const [cashFilter, setCashFilter] = useState('Semua');

            const [loginUser, setLoginUser] = useState('');
            const [loginPass, setLoginPass] = useState('');

            // Form Pelanggan
            const [custName, setCustName] = useState('');
            const [custPhone, setCustPhone] = useState('');
            const [custAddress, setCustAddress] = useState('');
            const [editCustId, setEditCustId] = useState(null);

            // Form Broadcast
            const [showBroadcast, setShowBroadcast] = useState(false);
            const [broadcastMsg, setBroadcastMsg] = useState('Halo Kak,\n\nKami dari *ARUNIKA Creative* sedang mengadakan PROMO spesial lho!\n\nDapatkan diskon khusus untuk cetak kebutuhan bisnis dan pribadimu.\n\nYuk buruan diorder sebelum kehabisan! Terima kasih 🙏');

            // Form Produk 
            const [prodName, setProdName] = useState('');
            const [prodPrice, setProdPrice] = useState('');
            const [prodModal, setProdModal] = useState('');
            const [prodUnit, setProdUnit] = useState('Pcs');
            const [editProdId, setEditProdId] = useState(null); 

            // Form Invoice
            const [invCustomer, setInvCustomer] = useState('');
            const [invPhone, setInvPhone] = useState('');
            const [invItems, setInvItems] = useState([]);
            const [selProd, setSelProd] = useState('');
            const [selQty, setSelQty] = useState('1');
            const [selType, setSelType] = useState('Pcs');
            const [selPanjang, setSelPanjang] = useState('');
            const [selLebar, setSelLebar] = useState('');
            const [selHarga, setSelHarga] = useState('');
            const [selModal, setSelModal] = useState('');
            const [selOngkosDesain, setSelOngkosDesain] = useState('');
            const [invDp, setInvDp] = useState('');
            
            // Form Kas
            const [cashDesc, setCashDesc] = useState('');
            const [cashAmount, setCashAmount] = useState('');
            const [cashType, setCashType] = useState('Keluar');
            const [cashSource, setCashSource] = useState('CASH');

            const [pcDesc, setPcDesc] = useState('');
            const [pcAmount, setPcAmount] = useState('');
            const [pcType, setPcType] = useState('Keluar'); 
            const [pcSync, setPcSync] = useState('Pribadi'); 
            const [pcWallet, setPcWallet] = useState('CASH'); 

            const [rekapSearch, setRekapSearch] = useState('');
            const [rekapMonth, setRekapMonth] = useState('Semua');
            const [rekapStatus, setRekapStatus] = useState('Semua');

            useEffect(() => {
                // Muat data lokal sementara jika ada, sambil menunggu data dari Google Sheets (Agar tidak blank)
                const localData = {
                    products: JSON.parse(localStorage.getItem('arunika_products')) || [],
                    customers: JSON.parse(localStorage.getItem('arunika_customers')) || [],
                    invoices: JSON.parse(localStorage.getItem('arunika_invoices')) || [],
                    cashbook: JSON.parse(localStorage.getItem('arunika_cashbook')) || [],
                    personalcash: JSON.parse(localStorage.getItem('arunika_personal_cash')) || []
                };

                if (localData.products.length > 0) setProducts(localData.products);
                if (localData.customers.length > 0) setCustomers(localData.customers);
                if (localData.invoices.length > 0) setInvoices(localData.invoices);
                if (localData.cashbook.length > 0) setCashBook(localData.cashbook);
                if (localData.personalcash.length > 0) setPersonalCashBook(localData.personalcash);

                if (API_URL === "ISI_DENGAN_LINK_API_YANG_ANDA_COPY_DARI_TAHAP_2_DISINI" || API_URL === "") {
                    setIsLoading(false);
                    return;
                }

                // Ambil data terbaru dari Google Sheets
                fetch(API_URL)
                    .then(res => res.json())
                    .then(data => {
                        if(data.users && data.users.length > 0) setUsers(data.users);
                        if(data.products) { setProducts(data.products); localStorage.setItem('arunika_products', JSON.stringify(data.products)); }
                        if(data.customers) { setCustomers(data.customers); localStorage.setItem('arunika_customers', JSON.stringify(data.customers)); }
                        if(data.invoices) { setInvoices(data.invoices); localStorage.setItem('arunika_invoices', JSON.stringify(data.invoices)); }
                        if(data.cashbook) { setCashBook(data.cashbook); localStorage.setItem('arunika_cashbook', JSON.stringify(data.cashbook)); }
                        if(data.personalcash) { setPersonalCashBook(data.personalcash); localStorage.setItem('arunika_personal_cash', JSON.stringify(data.personalcash)); }
                        setIsLoading(false);
                        showToast('Database Tersinkronisasi', 'success');
                    })
                    .catch(err => {
                        showToast('Gagal terhubung ke Database, menggunakan data lokal.', 'error');
                        setIsLoading(false);
                    });
            }, []);

            const showToast = (msg, type = 'error') => {
                setToast({ msg, type });
                setTimeout(() => setToast(null), 3000);
            };

            // FUNGSI SINKRONISASI DIPERBARUI UNTUK GOOGLE SHEETS
            const syncData = (tableName, updatedData) => {
                // 1. Update State Visual React
                if(tableName === 'customers') setCustomers(updatedData);
                if(tableName === 'products') setProducts(updatedData);
                if(tableName === 'invoices') setInvoices(updatedData);
                if(tableName === 'cashbook') setCashBook(updatedData);
                if(tableName === 'personalcash') setPersonalCashBook(updatedData);

                // 2. Simpan cadangan offline
                localStorage.setItem('arunika_' + tableName, JSON.stringify(updatedData));

                // 3. Kirim ke Google Sheets via POST
                if (API_URL && API_URL !== "ISI_DENGAN_LINK_API_YANG_ANDA_COPY_DARI_TAHAP_2_DISINI") {
                    fetch(API_URL, {
                        method: 'POST',
                        body: JSON.stringify({
                            tableName: tableName,
                            data: updatedData
                        })
                    }).catch(err => {
                        console.error("Gagal sinkron data ke Google Sheets", err);
                    });
                }
            };

            const getSaldo = (source) => cashBook.filter(c => c.source === source).reduce((acc, curr) => curr.type === 'Masuk' ? acc + curr.amount : acc - curr.amount, 0);
            const getTotalRealMoney = () => getSaldo('CASH') + getSaldo('BCA') + getSaldo('BRI');
            const getPersonalSaldo = () => personalCashBook.reduce((acc, curr) => curr.type === 'Masuk' ? acc + curr.amount : acc - curr.amount, 0);
            
            const getTotalOmset = () => invoices.reduce((acc, inv) => acc + inv.total, 0);
            const getTotalModal = () => invoices.reduce((acc, inv) => acc + (inv.totalModal || 0), 0);
            const getLabaKotor = () => getTotalOmset() - getTotalModal();

            const availableMonths = useMemo(() => {
                const months = invoices.map(inv => {
                    const parts = inv.date.split('/');
                    if(parts.length === 3) return `${parts[1]}/${parts[2]}`; 
                    return null;
                }).filter(Boolean);
                return [...new Set(months)];
            }, [invoices]);

            const filteredRekapInvoices = useMemo(() => {
                return invoices.filter(inv => {
                    const searchMatch = inv.customer.toLowerCase().includes(rekapSearch.toLowerCase()) || 
                                      displayNota(inv).toLowerCase().includes(rekapSearch.toLowerCase());
                    
                    let monthMatch = true;
                    if (rekapMonth !== 'Semua') {
                        const parts = inv.date.split('/');
                        if(parts.length === 3) {
                            const invMonth = `${parts[1]}/${parts[2]}`;
                            monthMatch = (invMonth === rekapMonth);
                        } else {
                            monthMatch = false; 
                        }
                    }

                    let statusMatch = true;
                    if (rekapStatus === 'Lunas') statusMatch = (inv.sisa === 0);
                    else if (rekapStatus === 'Menunggak') statusMatch = (inv.sisa > 0);

                    return searchMatch && monthMatch && statusMatch;
                });
            }, [invoices, rekapSearch, rekapMonth, rekapStatus]);

            const totalOmsetRekap = filteredRekapInvoices.reduce((sum, inv) => sum + inv.total, 0);
            const totalSisaRekap = filteredRekapInvoices.reduce((sum, inv) => sum + inv.sisa, 0);
            
            const downloadKasPDF = () => {
                const { jsPDF } = window.jspdf;
                const doc = new jsPDF();

                doc.setFontSize(22);
                doc.setTextColor(245, 166, 35); 
                doc.text("ARUNIKA PRINT POS", 14, 20);
                
                doc.setFontSize(14);
                doc.setTextColor(50, 50, 50);
                doc.text(`Laporan Buku Kas (${cashFilter === 'Semua' ? 'Semua Sumber' : cashFilter})`, 14, 30);
                
                doc.setFontSize(10);
                doc.setTextColor(100, 100, 100);
                doc.text(`Waktu Cetak: ${new Date().toLocaleString('id-ID')}`, 14, 36);

                doc.setFontSize(11);
                doc.setTextColor(0, 0, 0);
                doc.text(`Saldo Laci (CASH): ${formatRupiah(getSaldo('CASH'))}`, 14, 46);
                doc.text(`Saldo BCA: ${formatRupiah(getSaldo('BCA'))}`, 85, 46);
                doc.text(`Saldo BRI: ${formatRupiah(getSaldo('BRI'))}`, 145, 46);

                const tableColumn = ["Tanggal", "Keterangan", "Sumber", "Jenis", "Nominal"];
                const tableRows = [];

                const filteredData = cashBook.filter(cb => cashFilter === 'Semua' || cb.source === cashFilter);

                filteredData.forEach(cb => {
                    const nominalData = cb.type === 'Masuk' ? `+ ${formatRupiah(cb.amount)}` : `- ${formatRupiah(cb.amount)}`;
                    const rowData = [cb.date, cb.desc, cb.source, cb.type, nominalData];
                    tableRows.push(rowData);
                });

                doc.autoTable({
                    head: [tableColumn],
                    body: tableRows,
                    startY: 55,
                    theme: 'striped',
                    headStyles: { fillColor: [245, 166, 35], textColor: [255,255,255] },
                    styles: { fontSize: 9 },
                    columnStyles: { 4: { halign: 'right', fontStyle: 'bold' } }
                });

                doc.save(`Laporan_Kas_Arunika_${Date.now()}.pdf`);
                showToast('Laporan PDF berhasil diunduh!', 'success');
            };

            const handleLogin = (e) => {
                e.preventDefault();
                const inputUser = loginUser.toLowerCase();
                const user = users.find(u => u.username === inputUser && u.password === loginPass);
                
                if (user) {
                    setCurrentUser(user);
                    localStorage.setItem('arunika_current_user', JSON.stringify(user));
                } else {
                    showToast('Username atau password salah!', 'error');
                }
            };

            const handleLogout = () => {
                setCurrentUser(null);
                localStorage.removeItem('arunika_current_user');
            };

            const handleAddCustomer = () => {
                if(!custName || !custPhone) return showToast('Nama dan No WA wajib diisi!');
                
                if (editCustId) {
                    const updated = customers.map(c => c.id === editCustId ? { ...c, name: custName, phone: custPhone, address: custAddress } : c);
                    syncData('customers', updated);
                    showToast('Data pelanggan berhasil diubah!', 'success');
                } else {
                    const newCust = { id: Date.now(), name: custName, phone: custPhone, address: custAddress };
                    syncData('customers', [...customers, newCust]);
                    showToast('Pelanggan berhasil ditambahkan!', 'success');
                }
                
                setCustName(''); setCustPhone(''); setCustAddress(''); setEditCustId(null);
            };

            const handleEditCustomerClick = (c) => {
                setCustName(c.name);
                setCustPhone(c.phone);
                setCustAddress(c.address);
                setEditCustId(c.id);
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            };

            const handleDeleteCustomer = (id) => {
                if(window.confirm('Yakin ingin menghapus pelanggan ini?')) {
                    syncData('customers', customers.filter(c => c.id !== id));
                    showToast('Pelanggan berhasil dihapus!', 'success');
                }
            };

            const handleAddProduct = () => {
                if(!prodName || !prodPrice) return showToast('Isi nama dan harga jual!');
                if (editProdId) {
                    const updated = products.map(p => p.id === editProdId ? { ...p, name: prodName, unit: prodUnit, modal: Number(prodModal), price: Number(prodPrice) } : p);
                    syncData('products', updated);
                    showToast('Produk berhasil diubah!', 'success');
                } else {
                    syncData('products', [...products, {id: Date.now(), name: prodName, unit: prodUnit, modal: Number(prodModal), price: Number(prodPrice)}]);
                    showToast('Produk berhasil ditambahkan!', 'success');
                }
                setProdName(''); setProdModal(''); setProdPrice(''); setProdUnit('Pcs'); setEditProdId(null);
            };

            const handleEditProductClick = (p) => {
                setProdName(p.name);
                setProdModal(p.modal);
                setProdPrice(p.price);
                setProdUnit(p.unit || 'Pcs');
                setEditProdId(p.id);
                window.scrollTo({ top: 0, behavior: 'smooth' }); 
            };

            const handleDeleteProduct = (id) => {
                if(window.confirm('Yakin ingin menghapus produk ini?')) {
                    syncData('products', products.filter(p => p.id !== id));
                    showToast('Produk berhasil dihapus!', 'success');
                }
            };

            const handleInvCustomerChange = (e) => {
                const val = e.target.value;
                setInvCustomer(val);
                
                const found = customers.find(c => c.name.toLowerCase() === val.toLowerCase());
                if (found) {
                    setInvPhone(found.phone); 
                }
            };

            const addToCart = () => {
                if (!selProd || !selQty || !selHarga || !selModal) return showToast('Pilih produk, isi Harga Jual, Harga Modal, dan Qty!');
                const p = products.find(x => x.id.toString() === selProd);
                if (!p) return;

                let finalQty = Number(selQty);
                let subName = p.name;
                let hargaCetak = Number(selHarga) * finalQty;
                let subModal = Number(selModal) * finalQty;
                let ongkosDesain = Number(selOngkosDesain || 0);

                if (selType === 'Meter') {
                    if (!selPanjang || !selLebar) return showToast('Isi nilai Panjang dan Lebar!');
                    const luas = Number(selPanjang) * Number(selLebar);
                    subName = `${p.name} (${selPanjang}m x ${selLebar}m)`;
                    hargaCetak = luas * Number(selHarga) * finalQty;
                    subModal = luas * Number(selModal) * finalQty;
                }

                let totalSub = hargaCetak + ongkosDesain;
                let internalName = ongkosDesain > 0 ? `${subName} (+Desain)` : subName;

                setInvItems([...invItems, {
                    id: Date.now(), 
                    name: subName, 
                    internalName: internalName, 
                    baseName: p.name, 
                    qty: finalQty, 
                    type: selType, 
                    p: selPanjang, 
                    l: selLebar, 
                    price: Number(selHarga), 
                    modal: Number(selModal), 
                    total: totalSub, 
                    totalModal: subModal
                }]);

                setSelQty('1'); setSelPanjang(''); setSelLebar(''); setSelOngkosDesain(''); setSelProd(''); 
            };

            const removeFromCart = (idToRemove) => {
                setInvItems(invItems.filter(item => item.id !== idToRemove));
                showToast('Barang dihapus dari daftar.', 'success');
            };

            const handlePelunasan = () => {
                if(!payModal) return;
                const nominalSisa = payModal.sisa;
                
                const updatedInvoices = invoices.map(inv => {
                    if (inv.id === payModal.id) {
                        return { ...inv, dp: inv.total, sisa: 0 };
                    }
                    return inv;
                });
                syncData('invoices', updatedInvoices);

                const newCash = {
                    id: Date.now(),
                    date: new Date().toLocaleDateString('id-ID'),
                    desc: `Pelunasan Nota ${displayNota(payModal)} (${payModal.customer})`,
                    amount: nominalSisa,
                    type: 'Masuk',
                    source: payMethod
                };
                syncData('cashbook', [newCash, ...cashBook]);

                setPayModal(null);
                setDetailModal(null); 
                showToast(`Pembayaran Rp ${nominalSisa.toLocaleString('id-ID')} via ${payMethod} berhasil dicatat!`, 'success');
            };

            const printA6Nota = (invoice) => {
                let printContent = `
                <html>
                <head>
                    <title>Nota - ${displayNota(invoice)}</title>
                    <style>
                        @page { size: A6; margin: 0; }
                        body { font-family: 'Arial', sans-serif; margin: 0; padding: 20px; width: 105mm; height: 148mm; box-sizing: border-box; }
                        h1 { font-size: 24px; color: #F5A623; margin: 0; text-align: center;}
                        .info { font-size: 10px; margin-bottom: 10px; display: flex; justify-content: space-between;}
                        table { width: 100%; font-size: 10px; border-collapse: collapse; margin-bottom: 10px; }
                        th, td { border: 1px solid #000; padding: 4px; text-align: left; }
                        th { background: #eee; }
                        .total { font-size: 14px; font-weight: bold; text-align: right; }
                    </style>
                </head>
                <body>
                    <h1>ARUNIKA</h1>
                    <div style="text-align: center; font-size: 8px; margin-bottom: 15px;">Percetakan & Desain Grafis</div>
                    <div class="info">
                        <div>Untuk: <b>${invoice.customer}</b><br>Tgl: ${invoice.date}</div>
                        <div>Nota: ${displayNota(invoice)}</div>
                    </div>
                    <table>
                        <tr><th>Qty</th><th>Item</th><th>Total</th></tr>
                        ${invoice.items.map(item => `<tr><td style="text-align:center;">${item.qty}</td><td>${item.name}</td><td style="text-align:right;">${formatRupiah(item.total)}</td></tr>`).join('')}
                    </table>
                    <div class="total">TOTAL: ${formatRupiah(invoice.total)}</div>
                    <div style="text-align: right; font-size: 10px;">DIBAYAR: ${formatRupiah(invoice.dp)} <br> SISA: ${formatRupiah(invoice.sisa)}</div>
                    <div style="margin-top: 30px; text-align: center; font-size: 10px;">${invoice.sisa > 0 ? '*Belum Lunas' : '*Lunas - Terima Kasih!'}</div>
                </body>
                </html>`;
                
                const printWindow = window.open('', '_blank');
                printWindow.document.write(printContent);
                printWindow.document.close();
                printWindow.focus();
                setTimeout(() => { printWindow.print(); printWindow.close(); }, 500);
            };

            const sendWAInvoice = (invoice) => {
                let phone = formatPhoneWA(invoice.phone);
                if (!phone) return showToast('Nomor HP pelanggan tidak ada!');
                
                let itemList = invoice.items.map(it => `- ${it.qty}x ${it.name}`).join('\n');
                
                let msg = `Nota No: ${displayNota(invoice)}\n${itemList}\n\nTotal: *${formatRupiah(invoice.total)}*\n\nPastikan pesanan Anda sudah benar. Dengan melakukan pembayaran, pelanggan telah SETUJU atas Nota yang diterbitkan.\n\nbisa segera lakukan pembayaran via:\nBCA : 3301144677 a/n Abdur Rouf\nBRI : 628801016232530 a/n Abdur Rouf / QRISS\n\nTerima kasih atas kerjasamanya.`;
                
                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const sendWAReady = (invoice) => {
                let phone = formatPhoneWA(invoice.phone);
                if (!phone) return showToast('Nomor HP pelanggan tidak ada!');
                
                let itemList = invoice.items.map(it => `- ${it.qty}x ${it.name}`).join('\n');
                let msg = '';
                
                if (invoice.sisa === 0) {
                    msg = `Pesanan Cetak/Barang di ARUNIKA\nNota No: ${displayNota(invoice)}\n${itemList}\n\ntelah selesai.\n\nAbaikan bila telah diambil, terima kasih.`;
                } else {
                    msg = `Pesanan Cetak/Barang di ARUNIKA\nNota No: ${displayNota(invoice)}\n${itemList}\n\ntelah selesai.\n\n*Total Tagihan:* ${formatRupiah(invoice.total)}\n*Sudah Dibayar/DP:* ${formatRupiah(invoice.dp)}\n*SISA TAGIHAN:* ${formatRupiah(invoice.sisa)}\n\nMohon untuk menyiapkan pelunasan saat pengambilan barang, atau dapat juga melalui transfer.\n\nTerima kasih! 🙏`;
                }

                window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
            };

            const sendWAPayment = (invoice) => {
                let phone = formatPhoneWA(invoice.phone);
                if (!phone) return showToast('Nomor HP pelanggan tidak ada!');

                                            </select>
                                        </div>
                                        <button onClick={downloadKasPDF} className="bg-red-500 hover:bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition flex items-center gap-2">
                                            📄 Download Laporan PDF
                                        </button>
                                    </div>

                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm min-w-[600px]">
                                            <thead className="bg-white border-b text-xs text-gray-400 uppercase"><tr><th className="p-4">Tanggal</th><th className="p-4">Keterangan</th><th className="p-4 text-center">Sumber</th><th className="p-4 text-center">Jenis</th><th className="p-4 text-right">Nominal</th></tr></thead>
                                            <tbody className="divide-y">
                                                {filteredCashBook.map((cb,i)=>(
                                                    <tr key={i} className="hover:bg-slate-50">
                                                        <td className="p-4">{cb.date}</td>
                                                        <td className="p-4 font-bold">{cb.desc}</td>
                                                        <td className="p-4 text-center"><span className="bg-slate-200 px-2 py-1 rounded text-xs font-bold">{cb.source}</span></td>
                                                        <td className="p-4 text-center"><span className={`px-2 py-0.5 rounded text-xs text-white font-bold ${cb.type==='Masuk'?'bg-green-500':'bg-red-500'}`}>{cb.type}</span></td>
                                                        <td className={`p-4 text-right font-bold ${cb.type==='Masuk'?'text-green-600':'text-red-600'}`}>{cb.type==='Masuk'?'+':'-'}{formatRupiah(cb.amount)}</td>
                                                    </tr>
                                                ))}
                                                {filteredCashBook.length === 0 && (
                                                    <tr><td colSpan="5" className="p-8 text-center text-gray-400">Tidak ada data kas bisnis.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                        {activeTab === 'personalcash' && currentUser.role === 'Owner' && (
                            <div className="space-y-6 max-w-5xl">
                                <div className="bg-gradient-to-r from-violet-600 to-fuchsia-600 text-white p-8 rounded-2xl shadow-lg relative overflow-hidden">
                                    <div className="relative z-10">
                                        <p className="text-sm font-bold text-violet-200 uppercase tracking-widest mb-1">Total Saldo Pribadi Owner</p>
                                        <h3 className="text-4xl font-black">{formatRupiah(getPersonalSaldo())}</h3>
                                    </div>
                                    <div className="absolute -bottom-10 -right-10 opacity-20 text-9xl">👛</div>
                                </div>

                                <div className="bg-white p-6 rounded-2xl shadow-sm border border-violet-100">
                                    <h3 className="font-bold mb-4 text-violet-800 text-lg">Catat & Sinkronisasi Keuangan Pribadi</h3>
                                    <p className="text-sm text-gray-500 mb-4">Fitur ini memungkinkan Anda mencatat uang pribadi, atau mengambil uang dari bisnis (Prive) secara otomatis.</p>
                                    
                                    <div className="grid grid-cols-1 md:grid-cols-4 gap-3 mb-4">
                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-slate-500">Jenis Sinkronisasi</label>
                                            <select value={pcSync} onChange={e=>setPcSync(e.target.value)} className="p-3 border rounded-xl w-full bg-slate-50 font-bold text-violet-700">
                                                <option value="Pribadi">Hanya Catatan Pribadi</option>
                                                <option value="TarikBisnis">Ambil Uang Bisnis (Prive)</option>
                                                <option value="SuntikBisnis">Suntik Modal ke Bisnis</option>
                                            </select>
                                        </div>

                                        {pcSync === 'Pribadi' ? (
                                            <div className="md:col-span-1">
                                                <label className="text-xs font-bold text-slate-500">Uang Pribadi</label>
                                                <select value={pcType} onChange={e=>setPcType(e.target.value)} className="p-3 border rounded-xl w-full bg-white">
                                                    <option value="Masuk">Masuk (Pendapatan Lain)</option>
                                                    <option value="Keluar">Keluar (Jajan/Belanja)</option>
                                                </select>
                                            </div>
                                        ) : (
                                            <div className="md:col-span-1">
                                                <label className="text-xs font-bold text-red-500">
                                                    {pcSync === 'TarikBisnis' ? 'Ambil dari Laci/Rekening:' : 'Suntik ke Laci/Rekening:'}
                                                </label>
                                                <select value={pcWallet} onChange={e=>setPcWallet(e.target.value)} className="p-3 border border-red-200 rounded-xl w-full bg-red-50 font-bold">
                                                    <option value="CASH">CASH (Laci Bisnis)</option>
                                                    <option value="BCA">BCA (Rek Bisnis)</option>
                                                    <option value="BRI">BRI (Rek Bisnis)</option>
                                                </select>
                                            </div>
                                        )}

                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-slate-500">Keterangan / Catatan</label>
                                            <input type="text" placeholder="Misal: Beli Kopi" value={pcDesc} onChange={e=>setPcDesc(e.target.value)} className="p-3 border rounded-xl w-full" />
                                        </div>
                                        <div className="md:col-span-1">
                                            <label className="text-xs font-bold text-slate-500">Nominal</label>
                                            <input type="text" placeholder="Rp 0" value={formatInputNumber(pcAmount)} onChange={e=>setPcAmount(parseInputNumber(e.target.value))} className="p-3 border rounded-xl w-full font-bold" />
                                        </div>
                                    </div>
                                    <button onClick={()=>{
                                        if(!pcDesc || !pcAmount) return showToast('Isi keterangan dan nominal!');
                                        const amt = Number(pcAmount);
                                        const dStr = new Date().toLocaleDateString('id-ID');
                                        let finalType = pcType; 

                                        if(pcSync === 'TarikBisnis') finalType = 'Masuk'; 
                                        if(pcSync === 'SuntikBisnis') finalType = 'Keluar';

                                        const newPc = {id: Date.now(), date: dStr, desc: pcDesc, amount: amt, type: finalType, sync: pcSync};
                                        syncData('personalcash', [newPc, ...personalCashBook]);

                                        if(pcSync === 'TarikBisnis') {
                                            const newCb = {id: Date.now()+1, date: dStr, desc: `[PRIVE OWNER] ${pcDesc}`, amount: amt, type: 'Keluar', source: pcWallet};
                                            syncData('cashbook', [newCb, ...cashBook]);
                                        } else if (pcSync === 'SuntikBisnis') {
                                            const newCb = {id: Date.now()+1, date: dStr, desc: `[SUNTIKAN MODAL OWNER] ${pcDesc}`, amount: amt, type: 'Masuk', source: pcWallet};
                                            syncData('cashbook', [newCb, ...cashBook]);
                                        }

                                        setPcDesc(''); setPcAmount('');
                                        showToast('Data Kas Pribadi Berhasil Disimpan!', 'success');
                                    }} className="bg-violet-600 hover:bg-violet-700 text-white px-8 py-3 rounded-xl font-bold transition w-full md:w-auto shadow-lg shadow-violet-500/30">
                                        Proses & Simpan
                                    </button>
                                </div>

                                <div className="bg-white rounded-2xl shadow-sm overflow-hidden border border-violet-100">
                                    <div className="p-4 bg-violet-50 font-bold border-b border-violet-100 text-violet-800">
                                        Riwayat Keluar Masuk Uang Pribadi
                                    </div>
                                    <div className="overflow-x-auto">
                                        <table className="w-full text-left text-sm min-w-[600px]">
                                            <thead className="bg-white border-b text-xs text-gray-400 uppercase">
                                                <tr><th className="p-4">Tanggal</th><th className="p-4">Keterangan</th><th className="p-4 text-center">Tipe/Sinkronisasi</th><th className="p-4 text-right">Nominal</th></tr>
                                            </thead>
                                            <tbody className="divide-y">
                                                {personalCashBook.map((pc,i)=>(
                                                    <tr key={i} className="hover:bg-slate-50">
                                                        <td className="p-4 text-slate-500">{pc.date}</td>
                                                        <td className="p-4 font-bold text-slate-700">{pc.desc}</td>
                                                        <td className="p-4 text-center">
                                                            {pc.sync === 'TarikBisnis' && <span className="bg-red-100 text-red-600 px-2 py-1 rounded text-xs font-bold mr-2">Tarik dr Bisnis</span>}
                                                            {pc.sync === 'SuntikBisnis' && <span className="bg-blue-100 text-blue-600 px-2 py-1 rounded text-xs font-bold mr-2">Suntik ke Bisnis</span>}
                                                            <span className={`px-2 py-0.5 rounded text-xs text-white font-bold ${pc.type==='Masuk'?'bg-green-500':'bg-red-500'}`}>{pc.type} Pribadi</span>
                                                        </td>
                                                        <td className={`p-4 text-right font-bold ${pc.type==='Masuk'?'text-green-600':'text-red-600'}`}>
                                                            {pc.type==='Masuk'?'+':'-'}{formatRupiah(pc.amount)}
                                                        </td>
                                                    </tr>
                                                ))}
                                                {personalCashBook.length === 0 && (
                                                    <tr><td colSpan="4" className="p-8 text-center text-gray-400">Belum ada catatan kas pribadi.</td></tr>
                                                )}
                                            </tbody>
                                        </table>
                                    </div>
                                </div>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
